<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hide & Seek - Rainbow Garden</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    #gameContainer {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* UI Panels */
    .ui-panel {
      position: absolute;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      border-radius: 10px;
      padding: 20px;
      font-size: 16px;
      z-index: 100;
    }

    /* Main Menu */
    #mainMenu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      z-index: 200;
    }

    #mainMenu h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    #mainMenu p {
      margin-bottom: 30px;
      font-size: 18px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      color: #333;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      font-weight: bold;
      transition: background 0.3s;
    }

    button:hover {
      background: #45a049;
    }

    button.secondary {
      background: #2196F3;
    }

    button.secondary:hover {
      background: #0b7dda;
    }

    /* HUD */
    #hud {
      display: none;
    }

    .hud-top-left {
      top: 20px;
      left: 20px;
    }

    .hud-top-right {
      top: 20px;
      right: 20px;
      text-align: right;
    }

    .hud-bottom-left {
      bottom: 20px;
      left: 20px;
    }

    .hud-bottom-right {
      bottom: 20px;
      right: 20px;
      text-align: right;
    }

    .timer {
      font-size: 48px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }

    .phase-info {
      font-size: 24px;
      color: #00FF00;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      margin-bottom: 10px;
    }

    .seeker-info {
      font-size: 20px;
      color: #FF6B6B;
      margin-bottom: 10px;
    }

    .player-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .player-item {
      padding: 5px;
      margin: 3px 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      font-size: 14px;
    }

    .player-item.seeker {
      color: #FF6B6B;
      font-weight: bold;
    }

    .player-item.eliminated {
      color: #888;
      text-decoration: line-through;
    }

    .room-info {
      font-size: 18px;
      margin-bottom: 15px;
    }

    .room-code {
      font-size: 32px;
      font-weight: bold;
      color: #FFD700;
      letter-spacing: 2px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
    }

    /* Game Over Screen */
    #gameOverScreen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 300;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    #gameOverScreen h1 {
      font-size: 64px;
      margin-bottom: 30px;
    }

    #gameOverScreen p {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .survivor-list {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      margin: 20px;
      max-width: 500px;
    }

    .survivor-list h3 {
      margin-bottom: 15px;
      color: #00FF00;
    }

    .survivor-item {
      padding: 8px;
      margin: 5px 0;
    }

    .controls-info {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 12px;
      color: #888;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 5px;
      max-width: 200px;
    }
  </style>
</head>
<body>
  <div id="gameContainer"></div>

  <!-- Main Menu -->
  <div id="mainMenu">
    <h1>🌈 Hide & Seek</h1>
    <p>Rainbow Garden</p>
    
    <div style="margin-bottom: 20px;">
      <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="20">
    </div>

    <div class="button-group">
      <button onclick="createRoom()">Create Room</button>
      <button class="secondary" onclick="showJoinPanel()">Join Room</button>
    </div>

    <div id="joinPanel" style="display: none; margin-top: 20px;">
      <input type="text" id="roomCodeInput" placeholder="Enter room code" maxlength="6">
      <button onclick="joinRoom()" style="width: 100%;">Join</button>
      <button class="secondary" onclick="hideJoinPanel()" style="width: 100%; margin-top: 10px;">Cancel</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="ui-panel hud-top-left">
      <div class="room-info">Room Code:</div>
      <div class="room-code" id="roomCodeDisplay"></div>
      <div style="font-size: 14px; margin-top: 10px;">
        Players: <span id="playerCount">0</span>/10
      </div>
    </div>

    <div class="ui-panel hud-top-right">
      <div class="phase-info" id="phaseInfo">Lobby</div>
      <div class="timer" id="timer">--:--</div>
      <div class="seeker-info" id="seekerInfo"></div>
    </div>

    <div class="ui-panel hud-bottom-left">
      <div style="font-size: 18px; margin-bottom: 10px; font-weight: bold;">Players</div>
      <div class="player-list" id="playerList"></div>
    </div>

    <div class="ui-panel hud-bottom-right">
      <div id="statusInfo" style="font-size: 16px;"></div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen">
    <h1 id="gameOverTitle">Game Over!</h1>
    <p id="gameOverMessage"></p>
    <div class="survivor-list">
      <h3>Survivors:</h3>
      <div id="survivorsList"></div>
    </div>
    <button onclick="location.reload()" style="margin-top: 30px; padding: 15px 40px; font-size: 18px;">Play Again</button>
  </div>

  <div class="controls-info">
    <strong>Controls:</strong><br>
    WASD - Move<br>
    Mouse - Look<br>
    Space - Jump<br>
    Click - Lock cursor
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
